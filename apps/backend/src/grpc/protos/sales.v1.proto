syntax = "proto3";

package sales.v1;

service SalesService {
  rpc CreateSale(CreateSaleRequest) returns (SaleResponse);
  rpc GetAllSales(GetAllSalesRequest) returns (GetAllSalesResponse);
  rpc GetSaleById(GetSaleByIdRequest) returns (SaleResponse);
}

message SaleItemInput {
  int32 product_id = 1;
  int32 variant_combination_id = 2;
  int32 quantity = 3;
}

message SaleItem {
  int32 id = 1;
  int32 product_id = 2;
  string product_name = 3;
  string variant_name = 4;
  int32 quantity = 5;
  double selling_price = 6;
  double cogs = 7;
  double profit = 8;
}

message SaleResponse {
  int32 id = 1;
  string sale_date = 2;
  double total_amount = 3;
  double total_cogs = 4;
  double profit = 5;
  double voucher_discount = 6;
  string voucher_code = 7;
  repeated SaleItem items = 8;
}

message CreateSaleRequest {
  repeated SaleItemInput items = 1;
  string voucher_id = 2;
}

message GetAllSalesRequest {
  int32 page = 1;
  int32 limit = 2;
  int32 month = 3;
  int32 year = 4;
  string product_name = 5;
  string variant_name = 6;
}

message PaginationMeta {
  int32 total = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 total_pages = 4;
}

message GetAllSalesResponse {
  repeated SaleResponse data = 1;
  PaginationMeta meta = 2;
}

message GetSaleByIdRequest {
  int32 id = 1;
}
