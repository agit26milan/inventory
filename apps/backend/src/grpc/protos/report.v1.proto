syntax = "proto3";

package report.v1;

service ReportService {
  rpc GetSalesSummary(GetSalesSummaryRequest) returns (SalesSummaryResponse);
  rpc GetProductPerformance(EmptyRequest) returns (ProductPerformanceResponse);
  rpc GetVariantPerformance(GetVariantPerformanceRequest) returns (VariantPerformanceResponse);
  rpc GetInventoryValuation(EmptyRequest) returns (InventoryValuationResponse);
  rpc GetStockAlerts(GetStockAlertsRequest) returns (StockAlertsResponse);
  rpc GetSalesTimeframe(PaginatedSearchRequest) returns (SalesTimeframeResponse);
  rpc GetAnnualSales(GetAnnualSalesRequest) returns (AnnualSalesResponse);
  rpc GetMonthlyProfit(GetYearRequest) returns (MonthlyProfitResponse);
  rpc GetMonthlyOwnerWithdrawal(GetYearRequest) returns (MonthlyOwnerWithdrawalResponse);
}

message EmptyRequest {}

message GetSalesSummaryRequest {
  string start_date = 1;
  string end_date = 2;
}

message SalesSummaryResponse {
  double total_revenue = 1;
  double total_cogs = 2;
  double total_profit = 3;
  int32 total_transactions = 4;
}

message ProductPerformanceResponse {
  repeated ProductPerformanceItem data = 1;
}

message ProductPerformanceItem {
  string product_name = 1;
  int32 total_sold = 2;
  double total_revenue = 3;
  double total_profit = 4;
}

message GetVariantPerformanceRequest {
  int32 page = 1;
  int32 limit = 2;
  string product_name = 3;
  string variant_name = 4;
  string stock_sort = 5;
  string qty_sort = 6;
}

message VariantPerformanceItem {
  string variant_sku = 1;
  string product_name = 2;
  int32 total_sold = 3;
  int32 current_stock = 4;
  double total_revenue = 5;
}

message VariantPerformanceResponse {
  repeated VariantPerformanceItem data = 1;
  int32 total = 2;
  int32 page = 3;
}

message InventoryValuationResponse {
  repeated InventoryValuationItem data = 1;
  double total_value = 2;
}

message InventoryValuationItem {
  string product_name = 1;
  int32 remaining_quantity = 2;
  double cost_price = 3;
  double total_value = 4;
}

message GetStockAlertsRequest {
  int32 threshold = 1;
  int32 page = 2;
  int32 limit = 3;
  string search = 4;
}

message StockAlertItem {
  string product_name = 1;
  string variant_sku = 2;
  int32 current_stock = 3;
}

message StockAlertsResponse {
  repeated StockAlertItem data = 1;
  int32 total = 2;
}

message PaginatedSearchRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
}

message SalesTimeframeResponse {
  repeated SalesTimeframeItem data = 1;
  int32 total = 2;
}

message SalesTimeframeItem {
  string date = 1;
  double total_revenue = 2;
  double total_profit = 3;
  int32 transaction_count = 4;
}

message GetAnnualSalesRequest {
  int32 year = 1;
  int32 month = 2;
  int32 page = 3;
  int32 limit = 4;
  string search = 5;
}

message AnnualSalesResponse {
  repeated AnnualSalesItem data = 1;
  int32 total = 2;
}

message AnnualSalesItem {
  string period = 1;
  double total_revenue = 2;
  double total_profit = 3;
  int32 transaction_count = 4;
}

message GetYearRequest {
  int32 year = 1;
}

message MonthlyProfitResponse {
  repeated MonthlyProfitItem data = 1;
}

message MonthlyProfitItem {
  int32 month = 1;
  double total_revenue = 2;
  double total_profit = 3;
}

message MonthlyOwnerWithdrawalResponse {
  repeated MonthlyOwnerWithdrawalItem data = 1;
}

message MonthlyOwnerWithdrawalItem {
  int32 month = 1;
  double total_withdrawal = 2;
}
